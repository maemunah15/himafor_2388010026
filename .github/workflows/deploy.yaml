name: Deploy Web Static to AWS EC2
on:
  push:
    branches: [ main ]
    paths: 
    - 'web-statis/**'
    - '.github/workflows/deploy.yaml'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web-statis
        dockerfile: ./web-statis/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/himafor_2388010026:latest

    - name: Deploy to EC2 via SSH and run docker compose 
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          mkdir -p /home/ubuntu/himafor-web
          cd /home/ubuntu/himafor-web
          
          # Stop and remove existing container
          docker stop himafor-web-statis 2>/dev/null || true
          docker rm himafor-web-statis 2>/dev/null || true
          
          # Create docker-compose.yml
          cat > docker-compose.yml << 'EOF'
          services:
            web-statis:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/himafor_2388010026:latest
              container_name: himafor-web-statis
              ports:
                - "8080:80"
              restart: always
          EOF
          
          docker compose pull
          docker compose up -d