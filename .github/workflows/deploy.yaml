name: Deploy Web Static to AWS EC2
on:
  push:
    branches: [ master ]
    paths: 
    - 'web-statis/**'
    - '.github/workflows/deploy.yaml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web-statis
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/himafor_2388010020:latest

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    name: Deploy to EC2 via SSH and run docker compose
    steps:
    - name: SSH and deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/container-dinamis/web-dinamis
          docker compose pull
          docker compose up -d --force-recreate container-statis