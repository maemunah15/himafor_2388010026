name: Deploy Web Dinamis to AWS EC2
on:
  push:
    branches: [ main ]
    paths: 
    - 'web-dinamis/**'
    - '.github/workflows/deploy-dinamis.yaml'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./web-dinamis
        dockerfile: ./web-dinamis/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis:latest

    - name: Deploy to EC2 via SSH and run docker compose 
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USERNAME }}
        key: ${{ secrets.AWS_PRIVATE_KEY }}
        port: 22
        script: |
          mkdir -p /home/ubuntu/himafor-web-dinamis
          cd /home/ubuntu/himafor-web-dinamis
          
          # Force stop and remove existing containers
          docker-compose down -v 2>/dev/null || true
          docker stop himafor-web-dinamis-container-dinamis-1 2>/dev/null || true
          docker stop himafor-web-dinamis-db-webdinamis-1 2>/dev/null || true
          docker rm -f himafor-web-dinamis-container-dinamis-1 2>/dev/null || true
          docker rm -f himafor-web-dinamis-db-webdinamis-1 2>/dev/null || true
          
          # Remove old volume
          docker volume rm himafor-web-dinamis_db_data 2>/dev/null || true
          
          # Download database file from GitHub
          mkdir -p db_data
          curl -o db_data/dbcompro.sql https://raw.githubusercontent.com/${{ github.repository }}/main/web-dinamis/db_data/dbcompro.sql
          
          # Create docker-compose.yml
          cat > docker-compose.yml << 'EOF'
          services:
            db-webdinamis:
              image: mariadb:lts
              environment:
                MARIADB_ROOT_PASSWORD: password!123
                MARIADB_DATABASE: dbcompro
                MARIADB_USER: web-dinamis
                MARIADB_PASSWORD: User123
              volumes:
                - db_data:/var/lib/mysql
                - ./db_data/dbcompro.sql:/docker-entrypoint-initdb.d/dbcompro.sql:ro
              restart: always
              networks:
                - himafor-network
            
            container-dinamis:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis:latest
              ports:
                - "3000:3000"
              restart: always
              environment:
                DB_USER: web-dinamis
                DB_PASSWORD: User123
                DB_NAME: dbcompro
                DB_HOST: db-webdinamis
                NEXTAUTH_SECRET: ini-kata-kata-bebas-saja-32-karekter
                NEXTAUTH_URL: http://${{ secrets.AWS_HOST }}:3000
              depends_on:
                - db-webdinamis
              networks:
                - himafor-network
          
          volumes:
            db_data: {}
          
          networks:
            himafor-network:
              driver: bridge
          EOF
          
          docker compose pull
          docker compose up -d
