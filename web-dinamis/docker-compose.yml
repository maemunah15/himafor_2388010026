# Layanan database
services:
  db-webdinamis:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: password!123
      MARIADB_DATABASE: dbcompro
      MARIADB_USER: web-dinamis
      MARIADB_PASSWORD: User123
    volumes:
      - db_data:/var/lib/mysql
      - ./db_data/dbcompro.sql:/docker-entrypoint-initdb.d/dbcompro.sql:ro
    restart: always

  container-statis:
    image: maemunah/himafor_2388010026:latest
    ports:
      - "80:80"
    restart: always

  container-dinamis:
    image: maemunah/web-dinamis:latest
    ports:
      - "3000:3000"
    restart: always
    environment:
      DB_USER: web-dinamis
      DB_PASSWORD: User123
      DB_NAME: dbcompro
      DB_HOST: db-webdinamis
      NEXTAUTH_SECRET: ini-kata-kata-bebas-saja-32-karekter
      NEXTAUTH_URL: http://13.213.57.197:3000
    depends_on:
      - db-webdinamis

volumes:
  db_data: {}
